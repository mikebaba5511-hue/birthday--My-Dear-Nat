```html
<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>For Nat</title>

<style>

body{
margin:0;
height:100vh;
overflow:hidden;
font-family:Segoe UI;
background:linear-gradient(135deg,#ff9a9e,#fad0c4);
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
color:white;
text-align:center;
}

/* title */

#title{
font-size:40px;
margin-bottom:20px;
}

/* envelope */

.envelope{
font-size:100px;
cursor:pointer;
transition:0.3s;
}

.envelope:hover{
transform:scale(1.2);
}

/* cake */

#cake{
display:none;
font-size:120px;
cursor:pointer;
animation:float 2s infinite ease-in-out;
}

@keyframes float{
0%,100%{transform:translateY(0)}
50%{transform:translateY(-15px)}
}

/* card */

#card{
display:none;
background:rgba(0,0,0,0.4);
backdrop-filter:blur(10px);
padding:25px;
border-radius:20px;
width:80%;
max-width:600px;
height:300px;
overflow:auto;
box-shadow:0 10px 30px rgba(0,0,0,0.3);
}

/* text */

#text{
white-space:pre-line;
line-height:1.6;
}

/* roses */

.rose{
position:absolute;
font-size:30px;
animation:fall 6s linear infinite;
}

@keyframes fall{
0%{transform:translateY(-10vh)}
100%{transform:translateY(110vh)}
}

/* fireworks */

.firework{
position:absolute;
font-size:40px;
animation:boom 1s ease-out forwards;
}

@keyframes boom{
0%{transform:scale(0)}
100%{transform:scale(2);opacity:0}
}

</style>
</head>

<body>

<div id="title">For Nat 🤍</div>

<div class="envelope" onclick="openEnvelope()">💌</div>

<div id="cake" onclick="openMessage()">🎂</div>

<div id="card">
<div id="text"></div>
</div>

<audio id="music" loop>
<source src="reason.mp3" type="audio/mp3">
</audio>

<script>

/* message */

const message = `สุขสันต์วันเกิดนะ Nat 🎂

วันนี้เป็นอีกหนึ่งวันที่สำคัญของเธอ
เค้าแค่อยากอวยพรให้เธอจากใจจริง

🤍 ขอให้ปีนี้ใจดีกับเธอมาก ๆ
ขอให้เธอได้เจอแต่เรื่องดี ๆ
มีรอยยิ้มเยอะ ๆ

ถึงบางวันจะเหนื่อย
เค้าก็ยังคิดเสมอว่าเธอเก่งมาก

ดูแลตัวเองดี ๆ นะ
พักผ่อนให้พอ และขับรถดี ๆ ด้วย

ฉันรักเธอ รักมาเสมอ
และขอโทษในสิ่งที่เคยทำไม่ดี

ถ้าเข้าเกมแล้ว
มาเจอที่โถงอาหารได้ไหม

ฉันอยากพบเธออีกครั้ง 🤍`;

let i = 0;

/* envelope open */

function openEnvelope(){

document.querySelector(".envelope").style.display="none";
document.getElementById("cake").style.display="block";

}

/* open message */

function openMessage(){

document.getElementById("cake").style.display="none";
document.getElementById("card").style.display="block";

document.getElementById("music").play();

typeText();
roses();
fireworks();

}

/* typing */

function typeText(){

if(i < message.length){

document.getElementById("text").innerHTML += message.charAt(i);
i++;

setTimeout(typeText,30);

}

}

/* roses */

function roses(){

setInterval(()=>{

let r=document.createElement("div");
r.className="rose";
r.innerHTML="🌹";

r.style.left=Math.random()*100+"vw";

document.body.appendChild(r);

setTimeout(()=>r.remove(),6000);

},300);

}

/* fireworks */

function fireworks(){

setInterval(()=>{

let f=document.createElement("div");
f.className="firework";
f.innerHTML="🎆";

f.style.left=Math.random()*100+"vw";
f.style.top=Math.random()*100+"vh";

document.body.appendChild(f);

setTimeout(()=>f.remove(),1000);

},800);

}

</script>

</body>
</html>
```
